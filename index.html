<!DOCTYPE html>
<html lang="th">
<head>

<title>สาแหรกแห่งสภา</title>
<style>
:root{--bg:#141417;--sf:#1c1d24;--sf2:#22242e;--br:#2e3040;--tx:#e8eaf0;--mu:#5a5e72;--ac:#f0c040;--red:#e84040;--green:#4ab870;--blue:#5090e0}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans Thai','Sarabun',system-ui,sans-serif}
#hdr{padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700}.logo-sub{font-size:11px;color:var(--mu)}
#kpis{display:flex;gap:16px;margin-left:auto}.kv{font-size:19px;font-weight:700;color:var(--ac);line-height:1}.kl{font-size:10px;color:var(--mu);margin-top:1px}
#leg{display:flex;gap:8px;flex-wrap:wrap;padding:7px 20px;background:var(--bg);border-bottom:1px solid var(--br)}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu)}.lc{width:9px;height:9px;border-radius:2px;flex-shrink:0}
#wrap{position:relative}canvas{display:block}
#tip{position:fixed;z-index:99;background:rgba(18,19,22,.97);border:1px solid var(--br);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--tx);display:none;max-width:300px;line-height:1.7;box-shadow:0 6px 20px rgba(0,0,0,.5);pointer-events:none}
#tip b{color:#fff}
#pop{position:fixed;right:16px;top:72px;width:370px;max-height:calc(100vh - 88px);background:var(--sf);border:1px solid var(--br);border-radius:12px;display:none;flex-direction:column;z-index:98;box-shadow:0 12px 40px rgba(0,0,0,.6);overflow:hidden}
#ph{padding:12px 15px 9px;border-bottom:1px solid var(--br);flex-shrink:0;position:relative}
#pcl{position:absolute;top:10px;right:12px;cursor:pointer;color:var(--mu);font-size:14px;padding:2px 5px;border-radius:3px}#pcl:hover{background:var(--sf2)}
#ptt{font-size:13px;font-weight:700;color:#fff}#pss{font-size:11px;color:var(--mu);margin-top:2px}
#pb{overflow-y:auto;flex:1;font-size:12px}
#pb::-webkit-scrollbar{width:4px}#pb::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.sec{padding:10px 15px;border-bottom:1px solid var(--br)}
.st{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:9px;font-weight:600;margin:2px}
.bh{background:rgba(240,192,64,.18);color:#f0c040}.bm{background:rgba(100,160,255,.15);color:#64a0ff}
.bl{background:rgba(160,160,160,.1);color:#999}.baoj{background:rgba(255,100,80,.15);color:#ff8070}
.bex{background:rgba(100,220,100,.12);color:#7de07d}.bsw{background:rgba(200,140,255,.12);color:#c090ff}
.mi{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mi:last-child{border-bottom:none}.md{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mn{font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mp{font-size:10px;color:var(--mu);flex-shrink:0}
.trail{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.tc{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
/* Voting stats bar */
.vbar-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.vbar-label{font-size:10px;color:var(--mu);width:80px;flex-shrink:0;text-align:right}
.vbar-track{flex:1;height:6px;background:#2a2d3a;border-radius:3px;overflow:hidden}
.vbar-fill{height:100%;border-radius:3px;transition:width .3s}
.vbar-val{font-size:10px;color:var(--tx);width:38px;text-align:right;flex-shrink:0}
/* Person card */
.pcard{background:var(--sf2);border-radius:8px;padding:9px 11px;margin:4px 0;cursor:pointer;border:1px solid transparent;transition:.15s}
.pcard:hover{border-color:var(--br);background:#262830}
.pcard-name{font-size:12px;font-weight:600;color:#fff;margin-bottom:4px}
.pcard-stats{display:flex;gap:8px;flex-wrap:wrap}
.stat-chip{font-size:10px;padding:1px 7px;border-radius:6px;font-weight:500}
/* Bill list */
.bill-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;color:var(--tx)}
.bill-item:last-child{border-bottom:none}
.bill-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:5px;margin-left:4px;font-weight:600}
.tag-absent{background:rgba(232,64,64,.18);color:#e84040}
.tag-dissent{background:rgba(200,100,255,.18);color:#cc80ff}
.tag-low{background:rgba(255,160,50,.18);color:#ffa030}
/* Expanded person detail */
#person-detail{position:fixed;left:16px;top:72px;width:320px;max-height:calc(100vh - 88px);background:var(--sf);border:1px solid var(--br);border-radius:12px;display:none;flex-direction:column;z-index:97;box-shadow:0 12px 40px rgba(0,0,0,.6);overflow:hidden}
</style>

// ── Canvas Layout ─────────────────────────────────────────────────
const PAD={t:60,b:30,l:160,r:175};
const NW=26, NGAP=8;
let LAYOUT=null, hovState=null;

function computeLayout(W,H){
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;
  const colX={};
  TERMS.forEach((t,i)=>{colX[t]=PAD.l+i*(iW/(TERMS.length-1));});
  const termTotals={};
  TERMS.forEach(t=>{
    const ns=DATA.nodes.filter(n=>n.term===t&&n.count>=2);
    termTotals[t]=ns.reduce((s,n)=>s+n.count,0);
  });
  const nodes={};
  TERMS.forEach(t=>{
    const ns=DATA.nodes.filter(n=>n.term===t&&n.count>=2)
      .sort((a,b)=>PORD.indexOf(a.party)-PORD.indexOf(b.party));
    const sh=iH-NGAP*(ns.length-1); let y=PAD.t;
    ns.forEach(n=>{
      const h=Math.max(6,(n.count/termTotals[t])*sh);
      nodes[`${t}_${n.party}`]={x0:colX[t]-NW/2,y0:y,x1:colX[t]+NW/2,y1:y+h,cx:colX[t],cy:y+h/2,h,...n};
      y+=h+NGAP;
    });
  });
  const srcOff={},tgtOff={};
  Object.keys(nodes).forEach(k=>{srcOff[k]=nodes[k].y0;tgtOff[k]=nodes[k].y0;});
  const sortedLinks=[...DATA.links].sort((a,b)=>PORD.indexOf(a.from_party)-PORD.indexOf(b.from_party));
  const links=[];
  sortedLinks.forEach(lk=>{
    if(!lk.value) return;
    const sk=`${lk.from_term}_${lk.from_party}`, tk=`${lk.to_term}_${lk.to_party}`;
    const sn=nodes[sk], tn=nodes[tk]; if(!sn||!tn) return;
    const nsp=DATA.nodes.filter(n=>n.term===lk.from_term&&n.count>=2).length;
    const ntp=DATA.nodes.filter(n=>n.term===lk.to_term&&n.count>=2).length;
    const sh=iH-NGAP*(nsp-1), th=iH-NGAP*(ntp-1);
    const hs=Math.max(2,(lk.value/termTotals[lk.from_term])*sh);
    const ht=Math.max(2,(lk.value/termTotals[lk.to_term])*th);
    const sy0=srcOff[sk]; srcOff[sk]+=hs;
    const ty0=tgtOff[tk]; tgtOff[tk]+=ht;
    links.push({x0:sn.x1,sy0,sy1:sy0+hs,x1:tn.x0,ty0,ty1:ty0+ht,
      from_party:lk.from_party,to_party:lk.to_party,value:lk.value,_d:lk,sk,tk});
  });
  return {nodes,links,colX,iW,iH,termTotals};
}

function draw(hov){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  if(!LAYOUT) return;
  const {nodes,links,colX}=LAYOUT;
  links.forEach(l=>{
    const sc=pc(l.from_party), tc=pc(l.to_party);
    const mx=(l.x0+l.x1)/2;
    const lkey=`${l._d.from_term}_${l._d.from_party}_${l._d.to_term}_${l._d.to_party}`;
    const isHov=hov&&hov.type==='link'&&hov.key===lkey;
    const isNH=hov&&hov.type==='node'&&(hov.key===l.sk||hov.key===l.tk);
    const dim=hov&&!isHov&&!isNH;
    const a=dim?.05:isHov?.88:.52;
    function ha(c,al){return c+(Math.round(al*255).toString(16).padStart(2,'0'));}
    const g=ctx.createLinearGradient(l.x0,0,l.x1,0);
    g.addColorStop(0,ha(sc,a)); g.addColorStop(1,ha(tc,a));
    ctx.beginPath();ctx.moveTo(l.x0,l.sy0);
    ctx.bezierCurveTo(mx,l.sy0,mx,l.ty0,l.x1,l.ty0);
    ctx.lineTo(l.x1,l.ty1);ctx.bezierCurveTo(mx,l.ty1,mx,l.sy1,l.x0,l.sy1);
    ctx.closePath();ctx.fillStyle=g;ctx.fill();
  });
  Object.entries(nodes).forEach(([id,n])=>{
    const col=pc(n.party);
    const isH=hov&&hov.type==='node'&&hov.key===id;
    const dim=hov&&hov.type==='node'&&!isH;
    ctx.globalAlpha=dim?.25:1;
    ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(n.x0,n.y0,NW,n.h,3);ctx.fill();
    if(isH){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
    ctx.globalAlpha=1;
    const isR=n.term===TERMS[TERMS.length-1], isL=n.term===TERMS[0];
    ctx.fillStyle=dim?'#333':'#cdd0e0';
    ctx.font=`${n.h<14?9:11}px 'Noto Sans Thai',sans-serif`;
    ctx.textBaseline='middle';
    if(isR){ctx.textAlign='left';ctx.fillText(`${n.party} (${n.count})`,n.x1+7,n.cy);}
    else if(isL){ctx.textAlign='right';ctx.fillText(`${n.party} (${n.count})`,n.x0-7,n.cy);}
    else{ctx.textAlign='center';ctx.fillText(`${n.party} (${n.count})`,n.cx,n.cy);}
  });
  TERMS.forEach(t=>{
    const cx=colX[t], total=LAYOUT.termTotals[t];
    ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.globalAlpha=1;
    ctx.fillStyle='#e8eaf0';ctx.font='bold 15px "Noto Sans Thai",sans-serif';ctx.fillText(TL[t],cx,PAD.t-34);
    ctx.fillStyle='#5a5e72';ctx.font='10px "Noto Sans Thai",sans-serif';
    ctx.fillText(TY[t],cx,PAD.t-20);ctx.fillText(`${total} ที่นั่ง`,cx,PAD.t-8);
    ctx.strokeStyle='#1e2030';ctx.lineWidth=1;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(cx,PAD.t);ctx.lineTo(cx,PAD.t+LAYOUT.iH);ctx.stroke();
    ctx.setLineDash([]);
  });
}

function hitTest(mx,my){
  if(!LAYOUT)return null;
  const {nodes,links}=LAYOUT;
  for(const [id,n] of Object.entries(nodes)){
    if(mx>=n.x0&&mx<=n.x1&&my>=n.y0&&my<=n.y1)return{type:'node',key:id,data:n};
  }
  for(const l of links){
    const minX=Math.min(l.x0,l.x1),maxX=Math.max(l.x0,l.x1);
    const minY=Math.min(l.sy0,l.ty0),maxY=Math.max(l.sy1,l.ty1);
    if(mx<minX||mx>maxX||my<minY-2||my>maxY+2)continue;
    const t=(mx-l.x0)/(l.x1-l.x0),mt=1-t;
    const topY=mt*mt*l.sy0+2*mt*t*l.sy0+t*t*l.ty0;
    const botY=mt*mt*l.sy1+2*mt*t*l.sy1+t*t*l.ty1;
    if(my>=topY-3&&my<=botY+3){
      const lkey=`${l._d.from_term}_${l._d.from_party}_${l._d.to_term}_${l._d.to_party}`;
      return{type:'link',key:lkey,data:l};
    }
  }
  return null;
}

function setup(){
  const W=window.innerWidth, H=Math.max(700,window.innerHeight-100);
  const cv=document.getElementById('cv');
  cv.width=W;cv.height=H;cv.style.width=W+'px';cv.style.height=H+'px';
  LAYOUT=computeLayout(W,H);draw(null);
}

const tip=document.getElementById('tip');
function showTip(ev,html){
  tip.innerHTML=html;tip.style.display='block';
  let tx=ev.clientX+16,ty=ev.clientY-12;
  if(tx+310>window.innerWidth)tx=ev.clientX-314;
  if(ty+120>window.innerHeight)ty=ev.clientY-124;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}
function hideTip(){tip.style.display='none';}

document.getElementById('cv').addEventListener('mousemove',function(e){
  const hit=hitTest(e.offsetX,e.offsetY);
  if(hit){
    if(!hovState||hovState.key!==hit.key){hovState=hit;draw(hit);}
    this.style.cursor='pointer';
    if(hit.type==='link'){
      const l=hit.data._d;
      const bw=(l.persons||[]).filter(p=>p.baanyai_level).slice(0,5).map(p=>p.surname||p.name);
      const totalV=(l.persons||[]).filter(p=>p.voting).length;
      showTip(e,`<b>${l.from_party}</b> → <b>${l.to_party}</b><br>ชุด ${l.from_term}→${l.to_term} · <b>${l.value} คน</b>${bw.length?`<br><span style="font-size:10px;color:#aaa">👑 ${bw.join(', ')}</span>`:''}${totalV?`<br><span style="font-size:10px;color:#888">มีข้อมูลโหวต ${totalV} คน</span>`:''}`);
    }else{
      const n=hit.data;
      const allP=DATA.links.filter(l=>(l.from_term===n.term&&l.from_party===n.party)||(l.to_term===n.term&&l.to_party===n.party)).flatMap(l=>l.persons||[]);
      const bfams=[...new Map(allP.filter(p=>p.baanyai_level).map(p=>[p.surname,p])).values()].slice(0,5).map(p=>p.surname);
      showTip(e,`<b>${n.party}</b> · ชุด ${n.term}<br><b>${n.count} คน</b>${bfams.length?`<br><span style="font-size:10px;color:#aaa">ตระกูล: ${bfams.join(', ')}</span>`:''}`);
    }
  }else{
    if(hovState){hovState=null;draw(null);}
    this.style.cursor='default';hideTip();
  }
});
document.getElementById('cv').addEventListener('mouseleave',()=>{hovState=null;draw(null);hideTip();});
document.getElementById('cv').addEventListener('click',function(e){
  const hit=hitTest(e.offsetX,e.offsetY);
  if(!hit)return;
  if(hit.type==='link')openLP(hit.data._d);
  else openNP(hit.data);
});

function voteBar(label,pct,color){
  if(pct===null||pct===undefined)return '';
  return `<div class="vbar-row">
    <div class="vbar-label">${label}</div>
    <div class="vbar-track"><div class="vbar-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>
    <div class="vbar-val">${pct}%</div>
  </div>`;
}

function votingSection(v, title='🗳 สถิติการโหวต'){
  if(!v)return `<div class="sec" style="color:var(--mu);font-size:11px"><div class="st">${title}</div>ไม่มีข้อมูลการโหวต</div>`;
  let h=`<div class="sec"><div class="st">${title}</div>`;
  if(v.votes_n!==undefined) h+=`<div style="font-size:11px;color:var(--mu);margin-bottom:6px">โหวตทั้งหมด <b style="color:var(--tx)">${v.votes_n}</b> ครั้ง</div>`;
  // 5 ตัวรวมกัน 100%
  h+=voteBar('เห็นด้วย',       v.agree_rate    ||v.agree_rate_pct,    '#4ab870');
  h+=voteBar('ไม่เห็นด้วย',    v.disagree_rate ||v.disagree_rate_pct, '#e84040');
  h+=voteBar('งดออกเสียง',     v.abstain_rate  ||v.abstain_rate_pct,  '#9b8ed0');
  h+=voteBar('ลา/ขาด',         v.absent_rate   ||v.absent_rate_pct,   '#e88040');
  h+=voteBar('อื่นๆ',           v.other_rate    ||v.other_rate_pct,    '#666680');
  // divider
  h+=`<div style="border-top:1px solid var(--br);margin:7px 0 5px"></div>`;
  // แยก: โหวตตามพรรค vs สวนพรรค
  const fp = v.follow_party||v.follow_party_pct;
  const dp = fp!==null&&fp!==undefined ? Math.round((100-fp)*10)/10 : null;
  h+=voteBar('ตามพรรค',   fp, '#5090e0');
  h+=voteBar('สวนพรรค',   dp, '#cc80ff');
  h+=`<div style="font-size:10px;color:var(--mu);margin-top:4px;padding-left:88px">คำนวณจากเวลาที่เข้าร่วมโหวตเท่านั้น</div>`;
  h+='</div>';
  return h;
}

function billSection(items, tag_class, tag_text, title){
  if(!items||!items.length)return '';
  return `<div class="sec"><div class="st">${title}</div>` +
    items.map(d=>`<div class="bill-item">${d.bill||d.title||''}<span class="bill-tag ${tag_class}">${tag_text}</span>${d.vote?`<span style="font-size:10px;color:var(--mu)"> — ${d.vote} (พรรคว่า ${d.party_says})</span>`:''}</div>`).join('') +
    '</div>';
}

function personCard(p){
  const col=pc(p.party||''); 
  const v=p.voting;
  const absL=v&&v.absent_rate>40?`<span class="stat-chip" style="background:rgba(232,64,64,.15);color:#e84040">ขาด ${v.absent_rate}%</span>`:'';
  const disL=v&&v.dissents&&v.dissents.length?`<span class="stat-chip" style="background:rgba(200,100,255,.15);color:#cc80ff">สวนพรรค ${v.dissents.length}ครั้ง</span>`:'';
  const votL=v?`<span class="stat-chip" style="background:rgba(255,255,255,.06);color:var(--mu)">${v.votes_n}ครั้ง</span>`:'';
  return `<div class="pcard" onclick="openPerson(${JSON.stringify(p).replace(/"/g,'&quot;')})">
    <div class="pcard-name"><span class="md" style="background:${col};display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle"></span>${p.name} <span style="font-size:10px;color:var(--mu)">${p.province||''}</span></div>
    <div class="pcard-stats">${votL}${absL}${disL}</div>
  </div>`;
}

// ── Popup: Link ────────────────────────────────────────────────────
function openLP(lk){
  const col=pc(lk.from_party);
  document.getElementById('ptt').innerHTML=`<span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block;vertical-align:middle;margin-right:6px"></span>${lk.from_party} → <span style="color:${pc(lk.to_party)}">${lk.to_party}</span>`;
  document.getElementById('pss').textContent=`ชุด ${lk.from_term}→${lk.to_term} · ${lk.value} คน`;
  const ps=lk.persons||[];
  const bw=ps.filter(p=>p.baanyai_level);
  const ot=ps.filter(p=>!p.baanyai_level);
  let h='';
  if(bw.length){
    h+=`<div class="sec"><div class="st">👑 ตระกูลบ้านใหญ่ (${bw.length})</div>`;
    // Group by family_key
    const famGroups={};
    bw.forEach(p=>{const k=p.family_key||p.surname;if(!famGroups[k])famGroups[k]=[];famGroups[k].push(p);});
    Object.entries(famGroups).forEach(([k,ps2])=>{
      const fam=DATA.families[k];
      const lv=fam?fam.level:ps2[0].baanyai_level||'';
      const bc=lv==='high'?'bh':lv==='medium'?'bm':'bl';
      h+=`<div style="margin:4px 0 2px"><span class="badge ${bc}" style="cursor:pointer" onclick="openFP('${k}')">${ps2[0].surname||k} · ${lv}</span></div>`;
      ps2.forEach(p=>{ h+=personCard(p); });
    });
    h+=`</div>`;
  }
  if(ot.length){
    h+=`<div class="sec"><div class="st">สมาชิก (${Math.min(ot.length,25)}/${ot.length})</div>`;
    ot.slice(0,25).forEach(p=>{h+=personCard(p);});
    h+=`</div>`;
  }
  document.getElementById('pb').innerHTML=h;
  document.getElementById('pop').style.display='flex';
}

// ── Popup: Node ────────────────────────────────────────────────────
function openNP(n){
  const col=pc(n.party);
  document.getElementById('ptt').innerHTML=`<span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block;vertical-align:middle;margin-right:6px"></span>${n.party}`;
  document.getElementById('pss').textContent=`ชุด ${n.term} · ${n.count} คน`;
  const allP=DATA.links.filter(l=>(l.from_term===n.term&&l.from_party===n.party)||(l.to_term===n.term&&l.to_party===n.party)).flatMap(l=>l.persons||[]);
  const seen=new Set(); const uniq=allP.filter(p=>{if(seen.has(p.name))return false;seen.add(p.name);return true;});
  const bw=uniq.filter(p=>p.baanyai_level);
  const bfams=[...new Map(bw.map(p=>[p.family_key||p.surname,p])).values()];
  let h='';
  if(bfams.length){
    h+=`<div class="sec"><div class="st">👑 ตระกูลบ้านใหญ่ (${bfams.length})</div>`;
    bfams.forEach(p=>{
      const fam=DATA.families[p.family_key]||{};
      const lv=fam.level||p.baanyai_level||'';
      const bc=lv==='high'?'bh':lv==='medium'?'bm':'bl';
      h+=`<div class="mi" style="cursor:pointer" onclick="openFP('${p.family_key||''}')">
        <span class="md" style="background:${col}"></span>
        <span class="mn">${p.surname||p.name}</span>
        <span class="badge ${bc}">${lv}</span>
      </div>`;
    });
    h+=`</div>`;
  }
  const ot=uniq.filter(p=>!p.baanyai_level);
  h+=`<div class="sec"><div class="st">สมาชิก (${Math.min(uniq.length,20)}/${uniq.length})</div>`;
  uniq.slice(0,20).forEach(p=>{h+=personCard(p);});
  h+=`</div>`;
  document.getElementById('pb').innerHTML=h;
  document.getElementById('pop').style.display='flex';
}

// ── Popup: Family ──────────────────────────────────────────────────
function openFP(key){
  if(!key||!DATA.families[key])return;
  const fam=DATA.families[key];
  const parties=(fam.parties||'').split(',').map(s=>s.replace('พรรค','').trim()).filter(Boolean);
  const col=pc(parties[0]||'');
  document.getElementById('ptt').innerHTML=`<span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block;vertical-align:middle;margin-right:6px"></span>ตระกูล <b>${fam.surname}</b>`;
  document.getElementById('pss').textContent=`${fam.province} · ${fam.mp_count} สมาชิก`;
  const lv=fam.level||'';
  let h=`<div class="sec">
    <span class="badge ${lv==='high'?'bh':lv==='medium'?'bm':'bl'}">${lv==='high'?'👑 High':lv==='medium'?'🔵 Medium':'⚪ Low'}</span>
    ${fam.explicit?'<span class="badge bex">✅ Explicit</span>':''}
    ${fam.aoj?'<span class="badge baoj">🏛 AOJ</span>':''}
    ${parties.length>1?'<span class="badge bsw">🔀 เปลี่ยนพรรค</span>':''}
  </div>`;
  
  // Party trail
  const members=fam.members||[];
  const byTerm={};
  members.forEach(m=>{if(!byTerm[m.term])byTerm[m.term]=[];byTerm[m.term].push(m);});
  h+=`<div class="sec"><div class="st">สังกัดพรรคตามชุด</div><div class="trail">`;
  DATA.terms.forEach(t=>{const ms=byTerm[t];if(!ms||!ms.length)return;const mc=pc(ms[0].party);h+=`<span class="tc" style="background:${mc}22;color:${mc};border:1px solid ${mc}44">ชุด${t}: ${ms[0].party} (${ms.length})</span>`;});
  h+=`</div></div>`;

  // Family-level voting stats
  const fv=fam.voting||{};
  if(fv.absent_rate_pct!==undefined||fv.follow_party_pct!==undefined||fv.missed_bills_n){
    h+=`<div class="sec"><div class="st">🗳 สถิติโหวตระดับตระกูล</div>`;
    if(fv.missed_bills_n) h+=`<div style="font-size:11px;color:var(--mu);margin-bottom:5px">ขาดโหวต <b style="color:#e88040">${fv.missed_bills_n}</b> มติ</div>`;
    h+=voteBar('ลา/ขาดเฉลี่ย',fv.absent_rate_pct,'#e88040');
    h+=voteBar('ตามพรรคเฉลี่ย',fv.follow_party_pct,'#5090e0');
    h+=`</div>`;
  }

  // Bills context
  const bills=DATA.bills_context;
  if(bills){
    const sigLow=bills.sig_low_participation?.slice(0,4)||[];
    if(sigLow.length){
      h+=`<div class="sec"><div class="st">📋 พรบ. ที่บ้านใหญ่ขาดโหวตมากกว่าปกติ</div>`;
      sigLow.forEach(b=>{h+=`<div class="bill-item">${b.title}<span class="bill-tag tag-low">บ้านใหญ่ ${b.baanyai_rate}% vs อื่น ${b.others_rate}%</span></div>`;});
      h+=`</div>`;
    }
  }

  // Member cards with voting
  const vmems=fv.members||[];
  if(vmems.length){
    h+=`<div class="sec"><div class="st">สมาชิก + สถิติโหวต</div>`;
    vmems.forEach(m=>{
      const mi=members.find(x=>x.name===m.name)||{};
      const mpObj={name:m.name,province:'',surname:fam.surname,baanyai_level:lv,family_key:key,voting:{votes_n:m.votes_n,absent_rate:m.absent_rate,disagree_rate:m.disagree_rate,follow_party:m.follow_party,dissents:m.dissents,absences:m.absences}};
      h+=personCard(mpObj);
    });
    if(!vmems.length) members.forEach(m=>{
      h+=`<div class="mi"><span class="md" style="background:${pc(m.party)}"></span><span class="mn">${m.name}</span><span class="mp">ชุด${m.term}</span></div>`;
    });
    h+=`</div>`;
  } else if(members.length){
    h+=`<div class="sec"><div class="st">รายชื่อสมาชิก</div>`;
    members.forEach(m=>{const mc=pc(m.party);h+=`<div class="mi"><span class="md" style="background:${mc}"></span><span class="mn">${m.name}</span><span class="mp">ชุด${m.term}·${m.party}</span></div>`;});
    h+=`</div>`;
  }

  document.getElementById('pb').innerHTML=h;
  document.getElementById('pop').style.display='flex';
}

// ── Popup: Individual Person ────────────────────────────────────────
function openPerson(p){
  const v=p.voting;
  const pd=document.getElementById('person-detail');
  const col=pc(p.party||'');
  document.getElementById('pdtt').innerHTML=`<span style="width:9px;height:9px;border-radius:50%;background:${col};display:inline-block;vertical-align:middle;margin-right:7px"></span>${p.name}`;
  document.getElementById('pdss').textContent=`${p.province||''} · ${p.baanyai_level||''}`;
  let h='';
  if(v){
    h+=votingSection(v,'🗳 สถิติโหวตส่วนตัว');
    h+=billSection(v.dissents||[],'tag-dissent','สวนพรรค','🚩 มติที่สวนพรรค');
    h+=billSection(v.absences||[],'tag-absent','ขาด','📭 มติที่ลา/ขาด');
  }else{
    h+=`<div class="sec" style="color:var(--mu);font-size:11px">ไม่พบข้อมูลการโหวตของบุคคลนี้</div>`;
  }
  document.getElementById('pdb').innerHTML=h;
  pd.style.display='flex';
}

function cpop(){document.getElementById('pop').style.display='none';}
document.addEventListener('click',e=>{
  if(!e.target.closest('#pop')&&!e.target.closest('#person-detail')&&e.target.id!=='cv'){
    cpop(); document.getElementById('person-detail').style.display='none';
  }
});

setup();
window.addEventListener('resize',setup);
</script>
</body>
</html>
